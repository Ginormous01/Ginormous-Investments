<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — Ginormous Investments</title>
  <link rel="stylesheet" href="style.css">
  <script src="notifications.js"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .auth-header {
      margin-bottom: 30px;
    }
    .auth-header h1 {
      color: #1a1a2e;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .auth-header p {
      color: #666;
      font-size: 14px;
    }
    .btn-primary {
      background: #1a1a2e;
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary:hover { background: #16213e; }
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-radius: 50%;
      border-top-color: #1a1a2e;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon-large {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div id="statusContent">
        <div class="spinner"></div>
        <div class="auth-header">
          <h1>Verifying your email...</h1>
          <p>Please wait while we verify your email address.</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    (async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const email = urlParams.get('email');
      const container = document.getElementById('statusContent');

      if (!token || !email) {
        showNotification('This verification link is invalid or incomplete.', 'error');
        container.innerHTML = `
          <div class="auth-header">
            <span class="icon-large">❌</span>
            <h1>Invalid Link</h1>
            <p>This verification link is invalid or incomplete.</p>
          </div>
          <a href="staff-login.html" class="btn-primary">Back to Login</a>
        `;
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/auth/verify-email`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: decodeURIComponent(email), token })
        });
        const data = await response.json();

        if (data.success) {
          showNotification('Email verified successfully! You can now log in.', 'success');
          container.innerHTML = `
            <div class="auth-header">
              <span class="icon-large">✅</span>
              <h1>Email Verified!</h1>
              <p>Your email has been successfully verified. You can now log in to your account.</p>
            </div>
            <a href="staff-login.html" class="btn-primary">Go to Login</a>
          `;
        } else {
          showNotification(data.error || 'Unable to verify your email. The link may have expired.', 'error');
          container.innerHTML = `
            <div class="auth-header">
              <span class="icon-large">❌</span>
              <h1>Verification Failed</h1>
              <p>${data.error || 'Unable to verify your email. The link may have expired.'}</p>
            </div>
            <a href="staff-login.html" class="btn-primary" style="margin-top:10px;">Back to Login</a>
          `;
        }
      } catch (error) {
        console.error('Verification error:', error);
        showNotification('Unable to connect to the server. Please make sure the backend is running.', 'error');
        container.innerHTML = `
          <div class="auth-header">
            <span class="icon-large">⚠️</span>
            <h1>Connection Error</h1>
            <p>Unable to connect to the server. Please make sure the backend is running.</p>
          </div>
          <a href="staff-login.html" class="btn-primary" style="margin-top:10px;">Back to Login</a>
        `;
      }
    })();
  </script>
</body>
</html>

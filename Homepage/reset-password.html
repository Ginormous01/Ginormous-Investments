<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Ginormous Investments</title>
  <link rel="stylesheet" href="style.css">
  <script src="notifications.js"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-header h1 {
      color: #1a1a2e;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .auth-header p {
      color: #666;
      font-size: 14px;
    }
    .auth-form label {
      display: block;
      margin-bottom: 20px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    .auth-form input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      margin-top: 6px;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .auth-form input:focus {
      outline: none;
      border-color: #1a1a2e;
    }
    .btn-primary {
      background: #1a1a2e;
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #16213e; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-links {
      text-align: center;
      margin-top: 20px;
    }
    .auth-links a {
      color: #1a1a2e;
      text-decoration: none;
      font-size: 14px;
    }
    .auth-links a:hover { text-decoration: underline; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .password-strength {
      margin-top: 6px;
      font-size: 12px;
      min-height: 18px;
    }
    .password-strength.weak { color: #dc3545; }
    .password-strength.medium { color: #ffc107; }
    .password-strength.strong { color: #28a745; }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-header">
        <h1>Reset Password</h1>
        <p>Enter your new password below.</p>
      </div>

      <form id="resetForm" class="auth-form">
        <label>
          New Password
          <input type="password" id="newPassword" placeholder="At least 6 characters" required minlength="6">
          <div id="passwordStrength" class="password-strength"></div>
        </label>
        <label>
          Confirm Password
          <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
        </label>
        <button type="submit" class="btn-primary" style="width:100%;" id="submitBtn">
          Reset Password
        </button>
      </form>

      <div class="auth-links">
        <a href="staff-login.html">Back to Login</a>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    // Get token and email from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const email = urlParams.get('email');

    if (!token || !email) {
      showNotification('Invalid reset link. Please request a new password reset.', 'error');
      document.getElementById('submitBtn').disabled = true;
    }

    // Password strength indicator
    document.getElementById('newPassword').addEventListener('input', function() {
      const val = this.value;
      const strengthEl = document.getElementById('passwordStrength');
      if (val.length === 0) {
        strengthEl.textContent = '';
        strengthEl.className = 'password-strength';
        return;
      }
      let strength = 'weak';
      if (val.length >= 8 && /[A-Z]/.test(val) && /[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) {
        strength = 'strong';
      } else if (val.length >= 6 && /[A-Z]/.test(val) && /[0-9]/.test(val)) {
        strength = 'medium';
      }
      strengthEl.textContent = strength === 'strong' ? 'Strong password' : strength === 'medium' ? 'Medium strength' : 'Weak password';
      strengthEl.className = 'password-strength ' + strength;
    });

    document.getElementById('resetForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');

      // Validate passwords match
      if (newPassword !== confirmPassword) {
        showNotification('Passwords do not match.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Resetting...';

      try {
        const response = await fetch(`${API_BASE}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: decodeURIComponent(email), token, newPassword })
        });
        const data = await response.json();

        if (data.success) {
          showNotification(data.message, 'success');
          submitBtn.disabled = true;
          submitBtn.textContent = 'Redirecting to login...';
          setTimeout(() => {
            window.location.href = 'staff-login.html';
          }, 3000);
        } else {
          showNotification(data.error || 'Something went wrong. Please try again.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
        }
      } catch (error) {
        console.error('Reset password error:', error);
        showNotification('Unable to connect to the server. Please make sure the backend is running.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>

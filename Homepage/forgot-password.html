<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Ginormous Investments</title>
  <link rel="stylesheet" href="style.css">
  <script src="notifications.js"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-header h1 {
      color: #1a1a2e;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .auth-header p {
      color: #666;
      font-size: 14px;
    }
    .auth-form label {
      display: block;
      margin-bottom: 20px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    .auth-form input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      margin-top: 6px;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .auth-form input:focus {
      outline: none;
      border-color: #1a1a2e;
    }
    .btn-primary {
      background: #1a1a2e;
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover {
      background: #16213e;
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .auth-links {
      text-align: center;
      margin-top: 20px;
    }
    .auth-links a {
      color: #1a1a2e;
      text-decoration: none;
      font-size: 14px;
    }
    .auth-links a:hover {
      text-decoration: underline;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-header">
        <h1>Forgot Password</h1>
        <p>Enter your email address and we'll send you a reset link.</p>
      </div>

      <form id="forgotForm" class="auth-form">
        <label>
          Email address
          <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
        </label>
        <button type="submit" class="btn-primary" style="width:100%;" id="submitBtn">
          Send Reset Link
        </button>
      </form>

      <div class="auth-links">
        <a href="staff-login.html">Back to Login</a>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    document.getElementById('forgotForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const submitBtn = document.getElementById('submitBtn');

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Sending...';

      try {
        const response = await fetch(`${API_BASE}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await response.json();

        if (data.success) {
          showNotification(data.message, 'success');
          document.getElementById('email').value = '';
        } else {
          showNotification(data.error || 'Something went wrong. Please try again.', 'error');
        }
      } catch (error) {
        console.error('Forgot password error:', error);
        showNotification('Unable to connect to the server. Please make sure the backend is running.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
